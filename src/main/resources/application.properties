spring.datasource.password=q@2468435
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never

management.endpoints.web.exposure.include=health,info

# Floorplan JSON files contain base64-encoded images, so they can be much larger
# than ordinary form uploads.
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB
server.tomcat.max-http-form-post-size=512MB
server.tomcat.max-swallow-size=512MB

# Python executable used by FloorplanService. Change this if your IDE/server uses
# a different Python environment.
floorplan.python.command=/opt/anaconda3/bin/python3
