spring.application.name=duo
server.port=${SERVER_PORT:8081}

# ===============================
# MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/duo?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=q@2468435
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never

management.endpoints.web.exposure.include=health,info

# Floorplan JSON files contain base64-encoded images, so they can be much larger
# than ordinary form uploads.
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB
server.tomcat.max-http-form-post-size=512MB
server.tomcat.max-swallow-size=512MB

# Vectorized floor plans are JSON. Gzip further reduces polygon/metadata transfer.
server.compression.enabled=true
server.compression.min-response-size=2KB
server.compression.mime-types=application/json

# Python executable used by FloorplanService. Change this if your IDE/server uses
# a different Python environment.
floorplan.python.command=/opt/anaconda3/bin/python3

# Ultralytics model used to detect fixtures in uploaded floor-plan images.
# Override these with FLOORPLAN_DETECTOR_MODEL / FLOORPLAN_DETECTOR_CONFIDENCE.
floorplan.detector.model=${FLOORPLAN_DETECTOR_MODEL:weights/floorplan-fixtures.pt}
floorplan.detector.confidence=${FLOORPLAN_DETECTOR_CONFIDENCE:0.4}
