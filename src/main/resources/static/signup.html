<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Smart 3D Interior Planner</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="auth-page">
  <header id="top-nav">
    <a class="logo logo-link" href="/">
      <img src="https://www.hec.co.kr/assets/images/common/logo.svg" alt="현대엔지니어링" height="30">
      <div>
        <strong>Smart 3D Interior Planner</strong>
        <span>Hyundai Engineering</span>
      </div>
    </a>
    <div class="nav-actions">
      <a class="nav-link" href="/login.html">Login</a>
      <a class="primary-link" href="/">Planner</a>
    </div>
  </header>

  <main class="auth-main">
    <section class="auth-card auth-card-wide" aria-labelledby="signup-title">
      <div class="auth-heading">
        <span>New Account</span>
        <h1 id="signup-title">Sign Up</h1>
      </div>

      <form id="signup-form" class="auth-form" novalidate>
        <div class="field-grid">
          <div class="field-group">
            <label for="signup-name">이름</label>
            <input id="signup-name" name="name" type="text" autocomplete="name" required>
            <p class="field-error" data-error-for="name"></p>
          </div>

          <div class="field-group">
            <label for="signup-username">아이디</label>
            <div class="inline-field">
              <input id="signup-username" name="username" type="text" autocomplete="username" required>
              <button class="secondary-btn" type="button" data-check="username">중복 확인</button>
            </div>
            <p class="field-error" data-error-for="username"></p>
          </div>

          <div class="field-group field-grid-full">
            <label for="signup-email">이메일</label>
            <div class="inline-field">
              <input id="signup-email" name="email" type="email" autocomplete="email" required>
              <button class="secondary-btn" type="button" data-check="email">중복 확인</button>
            </div>
            <p class="field-error" data-error-for="email"></p>
          </div>

          <div class="field-group">
            <label for="signup-password">비밀번호</label>
            <input id="signup-password" name="password" type="password" autocomplete="new-password" required>
            <p class="field-error" data-error-for="password"></p>
          </div>

          <div class="field-group">
            <label for="signup-confirm-password">비밀번호 확인</label>
            <input id="signup-confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required>
            <p class="field-error" data-error-for="confirmPassword"></p>
          </div>
        </div>

        <p id="signup-message" class="form-message" role="status"></p>

        <button class="primary-btn auth-submit" type="submit">Sign Up</button>
      </form>

      <p class="auth-switch">이미 계정이 있으신가요? <a href="/login.html">Login</a></p>
    </section>
  </main>

  <script src="/static/js/auth.js"></script>
</body>
</html>
