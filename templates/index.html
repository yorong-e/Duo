<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Hyundai Engineering - 3D Space Simulator</title>
  
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <header id="top-nav">
    <div class="logo">
      <img src="https://www.hec.co.kr/assets/images/common/logo.svg" alt="현대엔지니어링" height="30">
      <span>스마트 3D 인테리어 플래너</span>
    </div>
    <div class="nav-actions">
      <label for="floorPlanInput" class="upload-btn">🗺️ 평면도 업로드</label>
      <input type="file" id="floorPlanInput" accept=".json" style="display: none;">
    </div>
  </header>

  <main>
    <aside id="sidebar">
      <h3>카탈로그</h3>
      <div id="furniture-list">
        <!-- JS에서 카탈로그 목록이 이곳에 생성됩니다 -->
      </div>
    </aside>

    <section id="canvas-container">
      <div id="furniture-toolbar">
        <button id="btn-rotate">🔄 90도 회전</button>
        <button id="btn-delete">🗑️ 삭제</button>
      </div>
    </section>
  </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DragControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
